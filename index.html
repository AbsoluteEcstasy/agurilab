<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>榊あぐり</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08140b">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="passwordScreen" class="screen active">
  <div class="overlayBox">
    <h1>SECRET ACCESS</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="passwordInput" placeholder="Password">
    <button id="passwordBtn">入室</button>
    <p id="passwordError"></p>
  </div>
</div>

<div id="titleScreen" class="screen">
  <img src="title.png" class="bg">
  <button id="startBtn" class="mainBtn">入る</button>
</div>

<div id="mainScreen" class="screen">
  <img src="zaguri.png" class="bg">

  <div id="ptDisplay">0 pt</div>

  <div class="buttonRow">
    <button id="talkBtn">話す</button>
    <button id="playBtn">遊ぶ</button>
    <button id="galleryBtn">ギャラリー</button>
  </div>

  <div id="dialogBox" class="dialog hidden"></div>
</div>

<div id="playScreen" class="screen">
  <img src="play.png" class="bg" id="playBg">

  <div id="playDialog" class="dialog">
    あぐりとじゃんけんしよう。何を出すか選んでね
  </div>

  <div class="buttonRow" id="jankenButtons">
    <button onclick="playJanken('グー')">グー</button>
    <button onclick="playJanken('チョキ')">チョキ</button>
    <button onclick="playJanken('パー')">パー</button>
  </div>

  <button id="backMainBtn" class="subBtn">戻る</button>
</div>

<div id="galleryScreen" class="screen">
  <div class="galleryHeader">
    <span>ギャラリー</span>
    <span id="galleryPt">0 pt</span>
  </div>

  <div id="galleryGrid"></div>

  <button id="galleryBackBtn" class="subBtn">戻る</button>
</div>

<div id="imageViewer" class="hidden">
  <div id="viewerClose">×</div>
  <img id="viewerImg">
</div>

<script src="script.js"></script>
</body>
</html>
